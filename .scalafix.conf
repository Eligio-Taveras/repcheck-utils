## Scalafix Configuration for RepCheck
## Enforces Scala code patterns and style for the RepCheck project
##
## Run: sbt "scalafixAll" (auto-fix) or sbt "scalafixAll --check" (CI lint)

rules = [
  OrganizeImports,
  RemoveUnused,
  LeakingImplicitClassVal
]

## Import Organization
## Enforces consistent import ordering across all files.
## Groups: Java stdlib → Scala stdlib → Cats → Circe → http4s → FS2 → Google → Other → RepCheck
OrganizeImports {
  groupedImports = Merge
  groups = [
    "re:javax?\\."
    "scala."
    "cats."
    "io.circe."
    "org.http4s."
    "fs2."
    "doobie."
    "pureconfig."
    "com.google."
    "*"
    "com.repcheck."
  ]
  removeUnused = true
  blankLines = Auto
  coalesceToWildcardImportThreshold = null
}

## Remove Unused
## Removes unused imports, private members, and local definitions.
RemoveUnused {
  imports = true
  privates = true
  locals = true
  patternvars = true
}
