# =============================================================================
# GitHub Actions — Auto-Bug Filing on Test Failure
# =============================================================================
# Add this as a step in your CI workflow, after the test job.
# On test failure: creates a GitHub Issue with error details.
# On test pass: closes any matching open bug issues.
#
# Usage: Add these steps to your existing ci.yml after the test step.
# =============================================================================

# ---------------------------------------------------------------------------
# Step 1: Create bug issue on test failure
# ---------------------------------------------------------------------------
# Add this step after your test step with: if: failure()
- name: Create bug issue on test failure
  if: failure()
  uses: actions/github-script@v7
  with:
    script: |
      const title = `CI Failure: ${context.workflow} on ${context.ref.replace('refs/heads/', '')}`;
      const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
      const body = [
        `## CI Test Failure`,
        ``,
        `| Detail | Value |`,
        `|--------|-------|`,
        `| **Workflow** | ${context.workflow} |`,
        `| **Branch** | ${context.ref.replace('refs/heads/', '')} |`,
        `| **Commit** | ${context.sha.substring(0, 8)} |`,
        `| **Run** | [View CI Run](${runUrl}) |`,
        `| **Triggered by** | ${context.actor} |`,
        `| **Timestamp** | ${new Date().toISOString()} |`,
        ``,
        `### Error Details`,
        `Check the [CI run logs](${runUrl}) for full error output.`,
        ``,
        `---`,
        `*This issue was automatically created by CI. It will be auto-closed when the tests pass.*`,
      ].join('\n');

      // Check if a similar issue already exists (avoid duplicates)
      const existingIssues = await github.rest.issues.listForRepo({
        owner: context.repo.owner,
        repo: context.repo.repo,
        state: 'open',
        labels: 'bug/ci-failure',
      });

      const duplicate = existingIssues.data.find(issue =>
        issue.title.includes(context.workflow) &&
        issue.title.includes(context.ref.replace('refs/heads/', ''))
      );

      if (duplicate) {
        // Update existing issue with latest failure info
        await github.rest.issues.createComment({
          owner: context.repo.owner,
          repo: context.repo.repo,
          issue_number: duplicate.number,
          body: `Still failing as of commit ${context.sha.substring(0, 8)}. [View run](${runUrl})`,
        });
        console.log(`Updated existing issue #${duplicate.number}`);
      } else {
        // Create new issue
        const issue = await github.rest.issues.create({
          owner: context.repo.owner,
          repo: context.repo.repo,
          title: title,
          body: body,
          labels: ['bug/ci-failure', 'automated'],
        });
        console.log(`Created issue #${issue.data.number}`);
      }

# ---------------------------------------------------------------------------
# Step 2: Auto-close bug issues on test pass
# ---------------------------------------------------------------------------
# Add this step after your test step with: if: success()
- name: Auto-close CI failure issues on success
  if: success()
  uses: actions/github-script@v7
  with:
    script: |
      const openIssues = await github.rest.issues.listForRepo({
        owner: context.repo.owner,
        repo: context.repo.repo,
        state: 'open',
        labels: 'bug/ci-failure',
      });

      const branchName = context.ref.replace('refs/heads/', '');
      const matchingIssues = openIssues.data.filter(issue =>
        issue.title.includes(context.workflow) &&
        issue.title.includes(branchName)
      );

      for (const issue of matchingIssues) {
        await github.rest.issues.createComment({
          owner: context.repo.owner,
          repo: context.repo.repo,
          issue_number: issue.number,
          body: `Tests passing again as of commit ${context.sha.substring(0, 8)}. Auto-closing.`,
        });
        await github.rest.issues.update({
          owner: context.repo.owner,
          repo: context.repo.repo,
          issue_number: issue.number,
          state: 'closed',
          state_reason: 'completed',
        });
        console.log(`Closed issue #${issue.number}`);
      }

# =============================================================================
# Integration Example — Add to your ci.yml:
# =============================================================================
#
# jobs:
#   build:
#     runs-on: ubuntu-latest
#     permissions:
#       contents: read
#       issues: write        # <-- Required for bug filing
#     steps:
#       - uses: actions/checkout@v4.2.2
#       - uses: actions/setup-java@v4.7.0
#         with:
#           java-version: '21'
#           distribution: 'temurin'
#       - uses: sbt/setup-sbt@v1
#
#       - name: Run tests
#         run: sbt coverage test coverageReport
#
#       # Paste Step 1 here (create bug on failure)
#       # Paste Step 2 here (auto-close on success)
#
# =============================================================================
# Labels Setup:
# Create these labels in your GitHub repo (Settings → Labels):
#   - bug/ci-failure  (color: #d73a4a)
#   - automated       (color: #0075ca)
# =============================================================================
