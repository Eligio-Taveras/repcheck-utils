name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**", "fix/**", "chore/**", "claude/**", "dev/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting (Scalafmt)
        run: sbt scalafmtCheckAll

      - name: Compile (includes WartRemover + tpolecat checks)
        run: sbt compile

      - name: Check Scalafix rules
        run: sbt "scalafixAll --check"

      - name: Run tests with coverage instrumentation
        run: sbt coverage test

      # Hard gate: coverageReport fails the build if any file is below the per-file minimums
      # (coverageMinimumStmtPerFile / coverageMinimumBranchPerFile := 95, coverageFailOnMinimum := true in build.sbt).
      - name: Enforce per-file coverage gate (>= 95% statement AND branch, every file)
        run: sbt coverageReport

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  doc-generator:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Compile doc generator
        run: sbt docGenerator/compile

      - name: Run doc generator tests
        run: sbt docGenerator/test
